<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Creative Coding</title>
    <style>
      @font-face {
        font-family: "Kanso Code";
        src: url("assets/fonts/KansoCode154-Regular.otf") format("opentype");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --paper: hsl(42 21.8% 94.5%);
        --ink: hsl(45 4.5% 10.5%);
        --line: hsl(41 11.4% 73.9%);
        --muted: hsl(42 4.8% 41.5%);
        --font: "Kanso Code", ui-monospace, "SFMono-Regular", Menlo, monospace;
      }
      body {
        font-family: var(--font);
        background: var(--paper);
        color: var(--ink);
        min-height: 100vh;
        padding: 2.5rem 1.5rem;
      }
      main {
        max-width: 28rem;
        margin: 0 auto;
      }
      h1 {
        font-size: 1.375rem;
        font-weight: 400;
        letter-spacing: -0.02em;
        text-transform: uppercase;
        margin-bottom: 1.5rem;
      }
      hr {
        border: none;
        border-top: 0.0625rem solid var(--line);
        margin: 0 0 1.5rem;
      }
      ul {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      a {
        color: var(--ink);
        text-decoration: none;
        font-size: 0.875rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        border-bottom: 0.0625rem solid var(--line);
        padding-bottom: 0.125rem;
      }
      a:hover {
        border-color: var(--ink);
      }
      .muted {
        margin-top: 0.25rem;
        font-size: 0.6875rem;
        color: var(--muted);
        text-transform: none;
        letter-spacing: 0;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Creative Coding</h1>
      <hr />
      <ul>
        <li>
          <a href="projects/hofmann-rubberband/">Hofmann Rubber Band</a>
          <p class="muted">Classic pin-order rubber band</p>
        </li>
      </ul>
    </main>
  </body>
</html>
