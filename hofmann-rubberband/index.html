<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hofmann Rubber Band</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
  </head>
  <body>
    <div id="app">
      <aside id="panel">
        <h1>Hofmann<br />Rubber Band</h1>
        <ul class="hint">
          <li>
            Move pin:
            <kbd aria-label="Up"><span class="icon" data-icon="up"></span></kbd>
            <kbd aria-label="Down"><span class="icon" data-icon="down"></span></kbd>
            <kbd aria-label="Left"><span class="icon" data-icon="left"></span></kbd>
            <kbd aria-label="Right"><span class="icon" data-icon="right"></span></kbd>
          </li>
          <li>
            Delete pin:
            <kbd aria-label="Backspace"><span class="icon" data-icon="backspace"></span></kbd>
          </li>
          <li>
            Undo:
            <kbd>Z</kbd>
          </li>
        </ul>

        <hr class="sep" />

        <div class="tools" role="group" aria-label="Mode">
          <button class="mode active" data-mode="edit" type="button">
            <span class="btn-main">
              <span class="icon" data-icon="edit" aria-hidden="true"></span>
              Edit
            </span>
          </button>
          <button class="mode" data-mode="preview" type="button">
            <span class="btn-main">
              <span class="icon" data-icon="eye" aria-hidden="true"></span>
              Preview
            </span>
          </button>
        </div>

        <hr class="sep" />

        <div class="tools" role="group" aria-label="Brush">
          <button class="tool active" data-tool="pin" type="button">
            <span class="btn-main">
              <span class="icon" data-icon="pin" aria-hidden="true"></span>
              Pin
            </span>
            <kbd>1</kbd>
          </button>
          <button class="tool" data-tool="erase" type="button">
            <span class="btn-main">
              <span class="icon" data-icon="eraser" aria-hidden="true"></span>
              Erase
            </span>
            <kbd>2</kbd>
          </button>
        </div>

        <label>
          <span>Grid size <em id="gridVal">5</em></span>
          <input id="grid" type="range" min="3" max="16" step="1" value="5" />
        </label>

        <label>
          <span>Circle size <em id="dotVal">100%</em></span>
          <input id="dot" type="range" min="55" max="140" step="1" value="100" />
        </label>

        <div class="checks">
          <label class="check">
            <input id="showGrid" type="checkbox" checked />
            <span>Show grid</span>
          </label>

          <label class="check">
            <input id="showOrder" type="checkbox" checked />
            <span>Show order</span>
          </label>
        </div>

        <p id="status" class="status">Pins 0</p>

        <div class="buttons">
          <button id="clear" type="button">
            <span class="btn-main">
              <span class="icon" data-icon="clear" aria-hidden="true"></span>
              Clear
            </span>
            <kbd>C</kbd>
          </button>
          <button id="saveSvg" class="primary" type="button">
            <span class="btn-main">
              <span class="icon" data-icon="download" aria-hidden="true"></span>
              Save SVG
            </span>
            <kbd>S</kbd>
          </button>
        </div>
      </aside>

      <main id="stage"></main>
    </div>

    <script src="geometry.js"></script>
    <script src="sketch.js"></script>
  </body>
</html>
