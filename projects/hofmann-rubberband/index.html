<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hofmann Rubber Band</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
  </head>
  <body>
    <div id="app">
      <aside id="panel">
        <h1>Hofmann <br class="title-break" />Rubber Band</h1>
        <hr class="sep" />
        <ul class="hint">
          <li>Select a pin — the next one is placed after it.</li>
          <li>
            Move pin:
            <kbd aria-label="Up"><span class="icon" data-icon="up"></span></kbd>
            <kbd aria-label="Down"><span class="icon" data-icon="down"></span></kbd>
            <kbd aria-label="Left"><span class="icon" data-icon="left"></span></kbd>
            <kbd aria-label="Right"><span class="icon" data-icon="right"></span></kbd>
          </li>
          <li>
            Delete pin:
            <kbd aria-label="Backspace"><span class="icon" data-icon="backspace"></span></kbd>
          </li>
          <li>
            Undo
            <kbd>Z</kbd>
            <span class="hint-sep" aria-hidden="true"></span>
            Redo
            <kbd>Y</kbd>
          </li>
          <li>
            Preview:
            <kbd class="kbd-space" aria-label="Space">SPACE</kbd>
            hold
          </li>
        </ul>

        <hr class="sep" />

        <div class="tools" role="group" aria-label="Mode">
          <button class="mode active" data-mode="edit" type="button">
            <span class="btn-main">
              <span class="icon" data-icon="edit" aria-hidden="true"></span>
              Edit
            </span>
          </button>
          <button class="mode" data-mode="preview" type="button">
            <span class="btn-main">
              <span class="icon" data-icon="eye" aria-hidden="true"></span>
              Preview
            </span>
          </button>
        </div>

        <label>
          <span>Grid size <em id="gridVal">4</em></span>
          <input id="grid" type="range" min="3" max="16" step="1" value="4" />
          <div class="presets" role="group" aria-label="Grid size presets">
            <button type="button" data-grid="4" class="active">4</button>
            <button type="button" data-grid="5">5</button>
            <button type="button" data-grid="6">6</button>
            <button type="button" data-grid="8">8</button>
          </div>
        </label>

        <label>
          <span>Circle size <em id="dotVal">75%</em></span>
          <input id="dot" type="range" min="33" max="95" step="1" value="75" />
          <div class="presets" role="group" aria-label="Circle size presets">
            <button type="button" data-dot="50">50%</button>
            <button type="button" data-dot="66">66%</button>
            <button type="button" data-dot="75" class="active">75%</button>
            <button type="button" data-dot="90">90%</button>
          </div>
        </label>

        <div class="checks">
          <label class="check">
            <input id="showGrid" type="checkbox" checked />
            <span>Show grid</span>
          </label>

          <label class="check">
            <input id="showOrder" type="checkbox" checked />
            <span>Show order</span>
          </label>
        </div>

        <p id="status" class="status">Pins 0</p>
      </aside>

      <main id="stage"></main>

      <div class="buttons">
        <button id="generate" class="primary" type="button">
          <span class="btn-main">
            <span class="icon" data-icon="generate" aria-hidden="true"></span>
            Generate
          </span>
          <kbd>G</kbd>
        </button>
        <div class="presets" role="group" aria-label="Pins">
          <button type="button" data-pins="less">Less</button>
          <button type="button" data-pins="medium">Medium</button>
          <button type="button" data-pins="more" class="active">More</button>
        </div>
        <hr class="sep" />
        <button id="clear" type="button">
          <span class="btn-main">
            <span class="icon" data-icon="clear" aria-hidden="true"></span>
            Clear
          </span>
          <kbd>C</kbd>
        </button>
        <button id="saveSvg" type="button">
          <span class="btn-main">
            <span class="icon" data-icon="download" aria-hidden="true"></span>
            Save SVG
          </span>
          <kbd>S</kbd>
        </button>
      </div>
    </div>

    <script src="geometry.js"></script>
    <script src="generate.js"></script>
    <script src="sketch.js"></script>
  </body>
</html>
